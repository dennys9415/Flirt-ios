name: Flirt
options:
  bundleIdPrefix: com.singularitybox
  deploymentTarget:
    iOS: "17.0"
schemes:
  Flirt:
    build:
      targets:
        Flirt: all
    run:
      config: Debug
      # Local StoreKit testing — subscriptions work in the simulator
      # without App Store Connect (see flirt-docs/ROADMAP.md v0.4)
      storeKitConfiguration: Flirt/Flirt.storekit
targets:
  Flirt:
    type: application
    platform: iOS
    sources: [Flirt, Shared]
    dependencies:
      - target: FlirtKeyboard
        embed: true
    entitlements:
      path: Flirt/Flirt.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.singularitybox.flirt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.singularitybox.flirt
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
    info:
      path: Flirt/Info.plist
      properties:
        UILaunchScreen: {}
        NSAppTransportSecurity:
          # Local dev only — the API runs on http://localhost:3000
          NSAllowsLocalNetworking: true

  FlirtKeyboard:
    type: app-extension
    platform: iOS
    sources: [FlirtKeyboard, Shared]
    entitlements:
      path: FlirtKeyboard/FlirtKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.singularitybox.flirt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.singularitybox.flirt.keyboard
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
        # Keyboard extensions run under a strict memory budget — keep it lean
        SKIP_INSTALL: YES
    info:
      path: FlirtKeyboard/Info.plist
      properties:
        CFBundleDisplayName: Flirt
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            # Network access (our API) requires the user to grant Full Access
            RequestsOpenAccess: true
