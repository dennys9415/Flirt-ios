name: Flirt
options:
  bundleIdPrefix: com.singularitybox
  deploymentTarget:
    iOS: "17.0"
targets:
  Flirt:
    type: application
    platform: iOS
    sources: [Flirt]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.singularitybox.flirt
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    info:
      path: Flirt/Info.plist
      properties:
        UILaunchScreen: {}
        NSAppTransportSecurity:
          # Local dev only — the API runs on http://localhost:3000
          NSAllowsLocalNetworking: true
